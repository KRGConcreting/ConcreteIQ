<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — ConcreteIQ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .error-container {
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            color: #E87A2E;
            letter-spacing: -0.04em;
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
            margin-top: 0.75rem;
        }

        .error-message {
            font-size: 1rem;
            color: #999999;
            margin-top: 0.75rem;
            line-height: 1.5;
        }

        .error-actions {
            margin-top: 2rem;
        }

        .btn-home {
            display: inline-block;
            padding: 0.75rem 2rem;
            background-color: #E87A2E;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            transition: background-color 0.2s ease;
        }

        .btn-home:hover {
            background-color: #d06a22;
        }

        .brand {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #555555;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">{{ status_code }}</div>
        <h1 class="error-title">{{ title }}</h1>
        <p class="error-message">{{ message }}</p>
        <div class="error-actions">
            <a href="{{ home_url | default('/dashboard') }}" class="btn-home">Go Home</a>
        </div>
        <p class="brand">KRG Concreting &mdash; ConcreteIQ</p>
    </div>
</body>
</html>
