{% extends "base.html" %}
{% block title %}Template Preview Error - ConcreteIQ{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto py-12 text-center">
    <div class="w-16 h-16 mx-auto mb-4 bg-red-100 rounded-full flex items-center justify-center">
        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
    </div>
    <h2 class="text-xl font-semibold text-slate-900 mb-2">Template Preview Error</h2>
    <p class="text-slate-600 mb-4">Could not preview template: {{ template_type }}</p>
    <div class="text-sm text-red-600 bg-red-50 p-4 rounded-lg text-left font-mono overflow-x-auto">
        {{ error }}
    </div>
    <a href="/settings/documents" class="inline-flex items-center gap-2 mt-6 text-orange-600 hover:text-orange-700">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Back to Documents
    </a>
</div>
{% endblock %}
