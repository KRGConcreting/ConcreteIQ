version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-concreteiq}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-concreteiq}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - REDIS_URL=redis://redis:6379/0
      - APP_URL=${APP_URL:?APP_URL must be set}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-concreteiq}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=${POSTGRES_DB:-concreteiq}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-concreteiq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-concreteiq}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-concreteiq}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - REDIS_URL=redis://redis:6379/0
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2

  celery-beat:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-concreteiq}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-concreteiq}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=${ENVIRONMENT:-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
